# ── CD: Deploy Bicep infrastructure on infra/ changes ────────
name: CD — Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Lint Bicep
        run: az bicep lint --file infra/main.bicep

      - name: What-if preview
        run: |
          KV_NAME="${{ secrets.AKS_CLUSTER_NAME }}-kv"
          LAW_NAME="${{ secrets.AKS_CLUSTER_NAME }}-law"
          az deployment group what-if \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters aksClusterName=${{ secrets.AKS_CLUSTER_NAME }} \
                         acrName=${{ secrets.ACR_NAME }} \
                         keyVaultName="$KV_NAME" \
                         logAnalyticsName="$LAW_NAME"

      - name: Deploy Bicep
        run: |
          KV_NAME="${{ secrets.AKS_CLUSTER_NAME }}-kv"
          LAW_NAME="${{ secrets.AKS_CLUSTER_NAME }}-law"
          az deployment group create \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters aksClusterName=${{ secrets.AKS_CLUSTER_NAME }} \
                         acrName=${{ secrets.ACR_NAME }} \
                         keyVaultName="$KV_NAME" \
                         logAnalyticsName="$LAW_NAME" \
            --mode Incremental
