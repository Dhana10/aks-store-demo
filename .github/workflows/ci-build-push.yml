# ── CI: Build & Push all microservice images to ACR ──────────
name: CI — Build & Push

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'

permissions:
  id-token: write
  contents: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: order-service
            context: src/order-service
          - name: product-service
            context: src/product-service
          - name: makeline-service
            context: src/makeline-service
          - name: store-front
            context: src/store-front
          - name: store-admin
            context: src/store-admin
          - name: virtual-customer
            context: src/virtual-customer
          - name: virtual-worker
            context: src/virtual-worker
          - name: ai-service
            context: src/ai-service

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build & push ${{ matrix.service.name }}
        run: |
          IMAGE="${{ secrets.ACR_NAME }}.azurecr.io/${{ matrix.service.name }}:${{ github.sha }}"
          docker build -t "$IMAGE" ${{ matrix.service.context }}
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Update GitOps manifest with new image
        if: github.ref == 'refs/heads/main'
        run: |
          KFILE="gitops/envs/production/${{ matrix.service.name }}/kustomization.yaml"
          sed -i "s|^[[:space:]]*newName:.*|    newName: ${{ secrets.ACR_NAME }}.azurecr.io/${{ matrix.service.name }}|g" "$KFILE"
          sed -i "s|^[[:space:]]*newTag:.*|    newTag: ${{ github.sha }}|g" "$KFILE"
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add gitops/
          git diff --staged --quiet || git commit -m "ci: update ${{ matrix.service.name }} to ${{ github.sha }}"
          git push
