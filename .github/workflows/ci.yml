# CI — triggered on every pull request touching src/.
# Runs: lint, unit tests, and a docker build (no push) to verify images are buildable.
# Requires NO Azure credentials — entirely local/GitHub-hosted.
name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  # ── Per-service build verification ──────────────────────────────────────────
  build:
    name: Build ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: order-service
            context: src/order-service
          - name: makeline-service
            context: src/makeline-service
          - name: product-service
            context: src/product-service
          - name: ai-service
            context: src/ai-service
          - name: store-front
            context: src/store-front
          - name: store-admin
            context: src/store-admin
          - name: virtual-customer
            context: src/virtual-customer
          - name: virtual-worker
            context: src/virtual-worker

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service.name }} (no push)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ matrix.service.name }}:pr-${{ github.event.pull_request.number }}

  # ── Node.js services: lint + unit test ───────────────────────────────────────
  test-order-service:
    name: Test order-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/order-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/order-service/package-lock.json
      - run: npm ci
      - run: npm test

  # ── Go services: lint + unit test ────────────────────────────────────────────
  test-makeline-service:
    name: Test makeline-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/makeline-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: src/makeline-service/go.sum
      - run: go build ./...
      - run: go vet ./...

  # ── Python services: lint ────────────────────────────────────────────────────
  test-ai-service:
    name: Lint ai-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pylint
      - run: pylint main.py --disable=all --enable=E || true  # errors only

  # ── Frontend: lint ───────────────────────────────────────────────────────────
  test-frontends:
    name: Lint ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [store-front, store-admin]
    defaults:
      run:
        working-directory: src/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/${{ matrix.service }}/package-lock.json
      - run: npm ci
      - run: npm run lint || true  # lint warnings don't fail CI
