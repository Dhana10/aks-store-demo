# Infra — triggered when infra/bicep/ files change on main.
# Runs: Bicep lint → what-if preview → deploy (subscription scope).
# Uses OIDC — no stored Azure credentials needed.
name: Infra — Deploy

on:
  push:
    branches: [main]
    paths:
      - 'infra/bicep/**'
      - 'infra/parameters/**'
      - '.github/workflows/infra.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infra/bicep/**'
      - 'infra/parameters/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write  # to post what-if results as PR comment

jobs:
  validate:
    name: Bicep Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: az bicep install

      - name: Lint main.bicep
        run: az bicep build --file infra/bicep/main.bicep

      - name: Lint new modules
        run: |
          for f in infra/bicep/rg.bicep infra/bicep/acr.bicep infra/bicep/keyvault.bicep infra/bicep/identity.bicep; do
            echo "Linting $f..."
            az bicep build --file "$f"
          done

  what-if:
    name: What-If Preview
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: What-if — dev
        id: whatif
        run: |
          az deployment sub what-if \
            --location eastus \
            --template-file infra/bicep/main.bicep \
            --parameters infra/parameters/dev.bicepparam \
            --parameters currentUserObjectId="${{ secrets.DEPLOYER_OBJECT_ID }}" \
                         currentIpAddress="${{ secrets.RUNNER_IP }}" \
            2>&1 | tee /tmp/whatif.txt
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/whatif.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Comment what-if on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `## Bicep What-If Preview\n\`\`\`\n${{ steps.whatif.outputs.output }}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  deploy-dev:
    name: Deploy Dev Infrastructure
    runs-on: ubuntu-latest
    needs: [validate, what-if]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy dev infrastructure
        run: |
          az deployment sub create \
            --name "aks-store-demo-dev-$(date +%Y%m%d-%H%M%S)" \
            --location eastus \
            --template-file infra/bicep/main.bicep \
            --parameters infra/parameters/dev.bicepparam \
            --parameters currentUserObjectId="${{ secrets.DEPLOYER_OBJECT_ID }}" \
                         currentIpAddress="${{ secrets.RUNNER_IP }}"
