# ClusterSecretStore wires External Secrets Operator to Azure Key Vault.
# It uses Workload Identity — the ESO controller service account must have
# Key Vault Secrets User role on the vault.
# Replace <KV_NAME> and <TENANT_ID> via Kustomize overlay patches.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: azure-keyvault
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: "https://<KV_NAME>.vault.azure.net"
      serviceAccountRef:
        name: external-secrets-sa
        namespace: external-secrets
