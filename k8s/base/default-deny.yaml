# Default-deny NetworkPolicy applied to every app namespace.
# Applied via Kustomize commonLabels / namespace patch in overlays.
# Each service's own networkpolicy.yaml opens only the specific ports it needs.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  egress:
    # Allow DNS so all pods can resolve service names
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
