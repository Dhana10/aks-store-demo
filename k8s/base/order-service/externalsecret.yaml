# ExternalSecret syncs the Service Bus connection string from Key Vault.
# When USE_WORKLOAD_IDENTITY_AUTH=true the SDK uses token auth directly and
# this secret is optional, but it is kept here for services that prefer connection strings.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: order-service-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: order-service-secrets
    creationPolicy: Owner
  data:
    - secretKey: SB_CONNECTION_STRING
      remoteRef:
        key: sb-connection-string
