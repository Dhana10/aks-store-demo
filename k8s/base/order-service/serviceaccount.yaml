# Service account annotated for AKS Workload Identity.
# The azure.workload.identity/client-id annotation is patched per environment overlay.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: order-service
  annotations:
    azure.workload.identity/client-id: "REPLACE_WITH_CLIENT_ID"
  labels:
    azure.workload.identity/use: "true"
